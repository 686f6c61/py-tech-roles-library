name: Publish to PyPI

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # trusted publishing de PyPI, sin tokens

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: |
          uv run ruff format --check
          uv run ruff check

      - name: Type check
        run: uv run ty check src/

      - name: Test
        run: uv run pytest

      - name: Validate release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION="$(uv run python -c 'import tech_roles_library; print(tech_roles_library.__version__)')"
          TAG_WITHOUT_V="${RELEASE_TAG#v}"

          if [ "$RELEASE_TAG" != "$PACKAGE_VERSION" ] && [ "$TAG_WITHOUT_V" != "$PACKAGE_VERSION" ]; then
            echo "Release tag ($RELEASE_TAG) does not match package version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
